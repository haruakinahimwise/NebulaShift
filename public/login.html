<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Log in – NebulaShift</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-body">
  <div class="auth-card">
    <h1>Welcome back</h1>

    <label>Username</label>
    <input id="username" type="text">

    <label>Password</label>
    <input id="password" type="password">

    <button id="login-btn">Log in</button>

    <p class="auth-switch">
      Need an account? <a href="signup.html">Sign up</a>
    </p>

    <p id="auth-error" class="auth-error"></p>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script type="module">
    import { supabaseClient } from "./js/supabaseClient.js";

    async function hashPassword(pw) {
      const msg = new TextEncoder().encode(pw);
      const hashBuffer = await crypto.subtle.digest("SHA-256", msg);
      return Array.from(new Uint8Array(hashBuffer))
        .map(b => b.toString(16).padStart(2, "0"))
        .join("");
    }

    document.getElementById("login-btn").onclick = async () => {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;

      const errorEl = document.getElementById("auth-error");
      errorEl.textContent = "";

      if (!username || !password) {
        errorEl.textContent = "Enter username and password.";
        return;
      }

      const hash = await hashPassword(password);

      const { data, error } = await supabaseClient
        .from("users")
        .select("*")
        .eq("username", username)
        .single();

      if (error || !data) {
        errorEl.textContent = "User not found.";
        return;
      }

      if (data.password_hash !== hash) {
        errorEl.textContent = "Wrong password.";
        return;
      }

      localStorage.setItem("nebula_user", JSON.stringify(data));
      window.location.href = "index.html";
    };
  </script>
</body>
</html>
