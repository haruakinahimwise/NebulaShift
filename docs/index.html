<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Googl</title>
  <link id="favicon" rel="icon" href="googl-favicon.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- CLOAK -->
  <div id="cloak-root" class="cloak-root">
    <div class="googl-logo">Googl</div>
    <div class="googl-search-wrapper">
      <input class="googl-search" placeholder="Search Googl or type a URL">
    </div>
  </div>

  <!-- APP -->
  <div id="app-root" class="app-root hidden">

    <div class="sidebar-servers">
      <div class="server-icon server-icon-home">N</div>
      <div id="servers-list"></div>
      <button id="add-server-btn" class="server-icon server-add">+</button>
    </div>

    <div class="sidebar-channels">
      <div id="server-name" class="server-header">Server</div>
      <div id="channels-list" class="channels-list"></div>

      <div class="user-panel">
        <div id="user-avatar" class="user-avatar"></div>
        <div class="user-info">
          <div id="user-username" class="user-username"></div>
          <div id="user-status" class="user-status">online</div>
        </div>
        <button id="logout-btn" class="logout-btn">⏻</button>
      </div>
    </div>

    <div class="main-chat">
      <div class="chat-header">
        <span id="chat-title">#general</span>
      </div>
      <div id="messages-list" class="messages-list"></div>
      <div class="chat-input-wrapper">
        <input id="chat-input" class="chat-input" placeholder="Message #general">
      </div>
    </div>

    <div class="sidebar-right">
      <div class="panel-header">Members</div>
      <div id="members-list" class="members-list"></div>
    </div>

  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script type="module" src="./js/main.js"></script>
</body>
</html>
