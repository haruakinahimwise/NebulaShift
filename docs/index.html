<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NebulaShift</title>

  <!-- LOAD SUPABASE v2 (CRITICAL) -->
  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
    window.supabase = { createClient };
  </script>

  <!-- Your CSS -->
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>

  <div id="app">

    <!-- LEFT: SERVER LIST -->
    <div id="server-list" class="sidebar servers">
      <!-- servers will be injected here -->
    </div>

    <!-- MIDDLE: CHANNEL LIST -->
    <div id="channels-list" class="sidebar channels">
      <!-- channels will be injected here -->
    </div>

    <!-- RIGHT: CHAT AREA -->
    <div id="chat" class="chat-container">
      <div class="chat-header">
        <h2 id="chat-title">#general</h2>
      </div>

      <div id="messages-list" class="messages"></div>

      <div class="chat-input-wrapper">
        <input 
          id="chat-input" 
          placeholder="Message #general" 
          autocomplete="off"
        />
      </div>
    </div>

  </div>

  <!-- JS FILES (order matters) -->
  <script type="module" src="./supabaseClient.js"></script>
  <script type="module" src="./chat.js"></script>

</body>
</html>
